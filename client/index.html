<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#33b1ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sortd" />
    <title>Sortd</title>
  </head>
  <body>
    <script>
      // Pre-React: redirect unauthenticated users to landing before React loads
      (function () {
        var path = window.location.pathname;
        var search = window.location.search;
        if (path === '/' && !search.includes('auth=')) {
          var hasSession = false;
          for (var key in localStorage) {
            if (/^sb-.+-auth-token$/.test(key)) {
              try {
                var d = JSON.parse(localStorage.getItem(key));
                if (d && d.access_token) hasSession = true;
              } catch (e) {}
              break;
            }
          }
          if (!hasSession) window.location.replace('/landing.html');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
